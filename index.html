<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background: #000;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.3;
        bgMusic.muted = localStorage.getItem('spaceRunnerMuted') === '1';
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            try { updateLanes(); } catch(e) {}
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function isMobile() {
            return ('ontouchstart' in window) || window.innerWidth < 768;
        }
        
        function getScaleFactor() {
            return Math.min(1, Math.max(0.6, canvas.width / 800));
        }

        // Fuente pixelada reservada para títulos/HUD; texto largo (instrucciones,
        // pantallas finales) usa sans-serif del sistema por legibilidad.
        const FONT_TITLE = '"Press Start 2P"';
        const FONT_BODY = 'system-ui, sans-serif';

        const COLORS = {
            background: '#000011',
            white: '#ffffff',
            lightBlue: '#88ccff',
            cyan: '#00ffff',
            red: '#ff4444',
            orange: '#ff8800',
            yellow: '#ffff00',
            green: '#44ff44',
            purple: '#aa44ff'
        };

        let audioCtx = null;
        let audioInitialized = false;
        let musicPlaying = false;
        let musicGain = null;
        let beatCount = 0;
        let nextNoteTime = 0;

        function initAudio() {
            if (audioInitialized) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                audioInitialized = true;
            } catch (e) {}
        }

        function startMusic() {
            if (!audioCtx) initAudio();
            if (!musicGain) {
                musicGain = audioCtx.createGain();
                musicGain.gain.value = game.muted ? 0 : 0.3;
                musicGain.connect(audioCtx.destination);
            }
            stopMusic();
            bgMusic.currentTime = 0;
            const p = bgMusic.play();
            if (p) p.catch(() => {});
            musicPlaying = true;
            scheduleMusic();
        }

        function startMusicInternal() {
            startMusic();
        }

        function scheduleMusic() {
            if (!audioCtx || !musicPlaying || game.state !== 'playing') return;

            // El tempo escala con la velocidad del juego (120-160 BPM), y sube al tope con el jefe
            const speedRatio = game.speed / game.maxSpeed;
            const bpm = game.bossActive ? 160 : 120 + speedRatio * 40;
            const secondsPerBeat = 60 / bpm;

            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                if (beatCount % 16 === 0) playKick(nextNoteTime);
                if (beatCount % 16 === 8) playSnare(nextNoteTime);
                if (beatCount % 2 === 0) playHiHat(nextNoteTime);
                if (beatCount % 8 === 0) playSpaceBass(nextNoteTime);
                if (game.bossActive && beatCount % 4 === 0) playHiHat(nextNoteTime + secondsPerBeat / 4);

                nextNoteTime += secondsPerBeat / 2;
                beatCount++;
            }
            setTimeout(scheduleMusic, 25);
        }

        function playKick(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120, time);
            osc.frequency.exponentialRampToValueAtTime(30, time + 0.15);
            gain.gain.setValueAtTime(0.6, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(time);
            osc.stop(time + 0.15);
        }

        function playSnare(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, time);
            gain.gain.setValueAtTime(0.3, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(time);
            osc.stop(time + 0.1);
        }

        function playHiHat(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(3000, time);
            gain.gain.setValueAtTime(0.05, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(time);
            osc.stop(time + 0.02);
        }

        function playSpaceBass(time) {
            const notes = [41, 41, 49, 41, 41, 55, 49, 41];
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(notes[beatCount % 8], time);
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, time);
            gain.gain.setValueAtTime(0.15, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(musicGain);
            osc.start(time);
            osc.stop(time + 0.2);
        }

        function stopMusic() {
            musicPlaying = false;
            try { bgMusic.pause(); } catch(e) {}
            try { bgMusic.currentTime = 0; } catch(e) {}
        }

        function playSound(type) {
            if (!audioCtx || game.muted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            // Pequeña variación aleatoria de pitch para que shoot/collect no suenen idénticos siempre
            const pitch = 0.94 + Math.random() * 0.12;

            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880 * pitch, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(220 * pitch, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'collect') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523 * pitch, audioCtx.currentTime);
                osc.frequency.setValueAtTime(784 * pitch, audioCtx.currentTime + 0.08);
                osc.frequency.setValueAtTime(1047 * pitch, audioCtx.currentTime + 0.16);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'gameover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        class Particle {
            constructor(x, y, color, shape) {
                this.x = x;
                this.y = y;
                this.shape = shape || 'square';
                if (this.shape === 'spark') {
                    // Impacto al jugador: fragmentos alargados y rápidos
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 0.5) * 8;
                    this.size = 3 + Math.random() * 4;
                } else if (this.shape === 'glow') {
                    // Recolección de power-up: brillo suave que converge hacia el centro
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.size = 3 + Math.random() * 4;
                } else {
                    // Explosión de enemigo: fragmentos angulares dispersos
                    this.vx = (Math.random() - 0.5) * 5;
                    this.vy = (Math.random() - 0.5) * 5;
                    this.size = 2 + Math.random() * 3;
                }
                this.life = 1;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.shape === 'glow' ? 0.06 : 0.04;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                if (this.shape === 'spark') {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    ctx.fillRect(-this.size, -this.size / 4, this.size * 2, this.size / 2);
                    ctx.restore();
                } else if (this.shape === 'glow') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.restore();
                }
                ctx.globalAlpha = 1;
            }
        }

        const game = {
            state: 'menu',
            score: 0,
            highScore: parseInt(localStorage.getItem('spaceRunnerHighScore')) || 0,
            lives: 3,
            speed: 5,
            maxSpeed: 15,
            player: { lane: 1, targetLane: 1, x: 0, y: 0, canMove: true, moveCooldown: 0, shootCooldown: 0, width: 50, height: 45, lanePositions: [0, 0, 0], multiShot: false, multiShotTimer: 0,     shieldActive: false, shieldTimer: 0, hitFlash: 0 },
            bullets: [],
            enemies: [],
            powerups: [],
            stars: [],
            planets: [],
            asteroids: [],
    particles: [],
    frameCount: 0,
    lastTouchY: 0,
    lastTouchX: 0,
    lastTouchTime: 0,
    speedAccumulator: 0,
    spawnTimer: 0,
    screenShake: 0,
    bossActive: false,
    bossSpawnScore: 500,
    combo: 0,
    comboTimer: 0,
    comboMessage: '',
    comboMessageTimer: 0,
    muted: localStorage.getItem('spaceRunnerMuted') === '1',
    shareFeedback: '',
};

        const getLaneWidth = () => canvas.width / 3;
        const getLaneStartX = () => canvas.width / 6;
        
        function updateLanes() {
            for (let i = 0; i < 3; i++) {
                game.player.lanePositions[i] = getLaneStartX() + i * getLaneWidth() - game.player.width / 2;
            }
        }
        
        function initGame() {
            game.score = 0;
            game.lives = 3;
            game.speed = 5;
            game.player.lane = 1;
            game.player.targetLane = 1;
            game.player.canMove = true;
            game.player.moveCooldown = 0;
            game.player.shootCooldown = 0;
            game.player.multiShot = false;
            game.player.multiShotTimer = 0;
    game.player.shieldActive = false;
    game.player.shieldTimer = 0;
    game.player.hitFlash = 0;
    game.screenShake = 0;
    game.bossActive = false;
    game.bossSpawnScore = 500;
    game.combo = 0;
    game.comboTimer = 0;
    game.comboMessage = '';
    game.comboMessageTimer = 0;
    game.bullets = [];
            game.enemies = [];
            game.powerups = [];
            game.particles = [];
            game.frameCount = 0;
            
            initStars();
            initPlanets();
            initAsteroids();
            updateLanes();
            game.player.x = game.player.lanePositions[1];
            game.player.y = canvas.height - 120;
        }

        function initStars() {
            game.stars = [];
            for (let i = 0; i < 150; i++) {
                game.stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: 0.5 + Math.random() * 2,
                    brightness: Math.random()
                });
            }
        }

        function initPlanets() {
            game.planets = [];
            for (let i = 0; i < 3; i++) {
                game.planets.push({
                    x: Math.random() * canvas.width,
                    y: -100 - Math.random() * 200,
                    radius: 20 + Math.random() * 30,
                    color: [COLORS.cyan, COLORS.purple, COLORS.green][Math.floor(Math.random() * 3)],
                    speed: 0.3 + Math.random() * 0.3
                });
            }
        }

        function initAsteroids() {
            game.asteroids = [];
            for (let i = 0; i < 5; i++) {
                game.asteroids.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 10 + Math.random() * 20,
                    speed: 0.5 + Math.random() * 1.5,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.1
                });
            }
        }

        function spawnEntity() {
            const lane = Math.floor(Math.random() * 3);
            const rand = Math.random();

            if (rand < 0.10) {
                game.powerups.push({
                    lane: lane, x: game.player.lanePositions[lane], y: -60,
                    width: 35, height: 40, type: 'health'
                });
            } else if (rand < 0.20) {
                game.powerups.push({
                    lane: lane, x: game.player.lanePositions[lane], y: -60,
                    width: 35, height: 40, type: 'shield'
                });
            } else if (rand < 0.30) {
                game.powerups.push({
                    lane: lane, x: game.player.lanePositions[lane], y: -60,
                    width: 35, height: 40, type: 'multishot'
                });
            } else if (rand < 0.55) {
                // Tank enemy
                game.enemies.push({
                    lane: lane, x: game.player.lanePositions[lane], y: -60,
                    width: 55, height: 50, type: 'tank', hp: 3,
                    shootTimer: Math.random() * 80
                });
            } else if (rand < 0.75) {
                // Speedster enemy
                const speedsterLane = Math.floor(Math.random() * 3);
                game.enemies.push({
                    lane: speedsterLane, x: game.player.lanePositions[speedsterLane], y: -60,
                    width: 35, height: 30, type: 'speedster',
                    moveDir: Math.random() > 0.5 ? 1 : -1,
                    moveTimer: 0
                });
            } else {
                // Normal or shooter
                game.enemies.push({
                    lane: lane, x: game.player.lanePositions[lane], y: -60,
                    width: 45, height: 40,
                    type: Math.random() > 0.5 ? 'shooter' : 'normal',
                    shootTimer: Math.random() * 80
                });
            }
        }

        const MAX_PARTICLES = 100;

        function spawnParticle(x, y, color, count, shape) {
            for (let i = 0; i < count; i++) {
                if (game.particles.length >= MAX_PARTICLES) break;
                game.particles.push(new Particle(x, y, color, shape));
            }
        }

        function shoot() {
            const px = game.player.x + game.player.width / 2;
            const py = game.player.y;

            if (game.player.multiShot) {
                // 5 balas en abanico
                const angles = [-4, -2, 0, 2, 4];
                for (let vx of angles) {
                    game.bullets.push({ x: px - 2, y: py - 10, vx: vx, vy: -13, width: 4, height: 10 });
                }
            } else {
                game.bullets.push({ x: px - 12, y: py - 10, vx: -2, vy: -12, width: 4, height: 10 });
                game.bullets.push({ x: px + 8,  y: py - 10, vx:  2, vy: -12, width: 4, height: 10 });
                game.bullets.push({ x: px - 2,  y: py - 15, vx:  0, vy: -14, width: 4, height: 12 });
            }

            playSound('shoot');
            game.player.shootCooldown = 15;
        }

        // Multiplicadores de paralaje: planetas (fondo lejano) reaccionan poco a la
        // velocidad del juego, asteroides (primer plano) reaccionan mucho más que las estrellas.
        const PARALLAX = { star: 1, planet: 0.3, asteroid: 1.8 };

        function updateBackground(dt) {
            for (let star of game.stars) {
                star.y += star.speed * (game.speed / 5) * PARALLAX.star * dt;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            }
            for (let planet of game.planets) {
                planet.y += planet.speed * (game.speed / 5) * PARALLAX.planet * dt;
                if (planet.y > canvas.height + 100) {
                    planet.y = -100 - Math.random() * 100;
                    planet.x = Math.random() * canvas.width;
                }
            }
            for (let ast of game.asteroids) {
                ast.y += ast.speed * (game.speed / 5) * PARALLAX.asteroid * dt;
                ast.x += Math.sin(ast.rotation) * 0.5;
                ast.rotation += ast.rotationSpeed;
                if (ast.y > canvas.height + 50) {
                    ast.y = -50;
                    ast.x = Math.random() * canvas.width;
                    ast.size = 10 + Math.random() * 20;
                }
            }
        }

        function updatePlayer(dt) {
            if (game.player.lane !== game.player.targetLane) {
                game.player.canMove = false;
                const target = game.player.lanePositions[game.player.targetLane];
                game.player.x += (target - game.player.x) * 0.25 * dt;
                if (Math.abs(game.player.x - target) < 2) {
                    game.player.lane = game.player.targetLane;
                    game.player.x = target;
                    game.player.canMove = true;
                    game.player.moveCooldown = 0;
                }
            } else {
                if (game.player.moveCooldown > 0) game.player.moveCooldown--;
                if (game.player.moveCooldown === 0) game.player.canMove = true;
                if (game.player.shootCooldown > 0) game.player.shootCooldown--;
            }
        }

        function updateBullets(dt) {
            for (let i = game.bullets.length - 1; i >= 0; i--) {
                const b = game.bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.y < -20 || b.y > canvas.height || b.x < -20 || b.x > canvas.width + 20) {
                    game.bullets.splice(i, 1);
                    continue;
                }
                if (!b.isEnemy) {
                    for (let j = game.enemies.length - 1; j >= 0; j--) {
                        const e = game.enemies[j];
                        if (b.x < e.x + e.width && b.x + b.width > e.x &&
                            b.y < e.y + e.height && b.y + b.height > e.y) {
                            game.bullets.splice(i, 1);
                            if (e.type === 'tank') {
                                e.hp--;
                                if (e.hp <= 0) {
                                    game.enemies.splice(j, 1);
                                    game.score += 50 * getComboMultiplier();
                                    game.combo++;
                                    game.comboTimer = 120;
                                    playSound('collect');
                                    spawnParticle(e.x + e.width/2, e.y + e.height/2, COLORS.purple, 25);
                                }
                            } else if (e.type === 'boss') {
                                e.hp--;
                                if (e.hp <= 0) {
                                    game.enemies.splice(j, 1);
                                    game.score += 200 * getComboMultiplier();
                                    game.combo++;
                                    game.comboTimer = 120;
                                    game.bossActive = false;
                                    playSound('collect');
                                    spawnParticle(e.x + e.width/2, e.y + e.height/2, COLORS.purple, 50);
                                }
                            } else {
                                game.enemies.splice(j, 1);
                                game.score += (e.type === 'shooter' ? 30 : e.type === 'speedster' ? 25 : 15) * getComboMultiplier();
                                game.combo++;
                                game.comboTimer = 120;
                                playSound('collect');
                                spawnParticle(e.x + e.width/2, e.y + e.height/2, COLORS.yellow, 15);
                            }
                            break;
                        }
                    }
                }
            }
        }

        function updateEnemies(dt) {
            for (let i = game.enemies.length - 1; i >= 0; i--) {
                const e = game.enemies[i];
                e.y += game.speed * dt;

                if (e.type === 'tank') {
                    e.shootTimer++;
                    if (e.shootTimer > 60 && Math.random() > 0.97) {
                        game.bullets.push({
                            x: e.x + e.width / 2 - 3, y: e.y + e.height,
                            vx: 0, vy: 6, width: 6, height: 10, isEnemy: true
                        });
                        e.shootTimer = 40;
                    }
                }

                if (e.type === 'speedster') {
                    e.moveTimer++;
                    if (e.moveTimer > 30) {
                        e.moveTimer = 0;
                        const nextLane = e.lane + e.moveDir;
                        if (nextLane < 0 || nextLane > 2) {
                            e.moveDir *= -1;
                        } else {
                            e.lane = nextLane;
                            e.x = game.player.lanePositions[e.lane];
                        }
                    }
                }

                if (e.type === 'boss') {
                    e.x += e.moveDir * 2;
                    if (e.x > game.player.lanePositions[2] + 20) e.moveDir = -1;
                    if (e.x < game.player.lanePositions[0] - 20) e.moveDir = 1;
                    e.shootTimer++;
                    if (e.shootTimer > 40) {
                        e.shootTimer = 0;
                        for (let a = -1; a <= 1; a++) {
                            game.bullets.push({
                                x: e.x + e.width / 2 - 3 + a * 15,
                                y: e.y + e.height,
                                vx: a * 1.5,
                                vy: 5,
                                width: 6,
                                height: 10,
                                isEnemy: true
                            });
                        }
                    }
                }

                if (!game.player.shieldActive && checkCollision(game.player, e)) {
                    game.lives--;
                    game.screenShake = 10;
                    game.player.hitFlash = 20;
                    if (game.combo > 1) {
                        game.comboMessage = `COMBO x${getComboMultiplier()} ROTO!`;
                        game.comboMessageTimer = 60;
                    }
                    game.combo = 0;
                    game.comboTimer = 0;
                    playSound('hit');
                    spawnParticle(game.player.x + game.player.width/2, game.player.y + game.player.height/2, COLORS.red, 25, 'spark');
                    game.enemies.splice(i, 1);

                    if (game.lives <= 0) {
                        game.state = 'gameover';
                        stopMusic();
                        playSound('gameover');
                        if (game.score > game.highScore) {
                            game.highScore = game.score;
                            localStorage.setItem('spaceRunnerHighScore', game.highScore);
                        }
                    }
                } else if (e.y > canvas.height + 50) {
                    game.enemies.splice(i, 1);
                }
            }
        }

        function updateEnemyBullets() {
            for (let i = game.bullets.length - 1; i >= 0; i--) {
                const b = game.bullets[i];
                if (b.isEnemy && !game.player.shieldActive && checkCollision(game.player, b)) {
                    game.lives--;
                    game.screenShake = 10;
                    game.player.hitFlash = 20;
                    if (game.combo > 1) {
                        game.comboMessage = `COMBO x${getComboMultiplier()} ROTO!`;
                        game.comboMessageTimer = 60;
                    }
                    game.combo = 0;
                    game.comboTimer = 0;
                    playSound('hit');
                    spawnParticle(game.player.x + game.player.width/2, game.player.y + game.player.height/2, COLORS.red, 25, 'spark');
                    game.bullets.splice(i, 1);

                    if (game.lives <= 0) {
                        game.state = 'gameover';
                        stopMusic();
                        playSound('gameover');
                        if (game.score > game.highScore) {
                            game.highScore = game.score;
                            localStorage.setItem('spaceRunnerHighScore', game.highScore);
                        }
                    }
                }
            }
        }

        function updatePowerups(dt) {
            for (let i = game.powerups.length - 1; i >= 0; i--) {
                const p = game.powerups[i];
                p.y += game.speed * dt;

                if (checkCollision(game.player, p)) {
                    if (p.type === 'health' && game.lives < 5) {
                        game.lives++;
                    } else if (p.type === 'multishot') {
                        game.player.multiShot = true;
                        game.player.multiShotTimer = 600;
                    } else if (p.type === 'shield') {
                        game.player.shieldActive = true;
                        game.player.shieldTimer = 180;
                    }
                    game.score += 40;
                    playSound('collect');
                    spawnParticle(p.x + p.width/2, p.y + p.height/2, COLORS.green, 15, 'glow');
                    game.powerups.splice(i, 1);

                    if (game.score >= 1500) {
                        game.state = 'win';
                        stopMusic();
                        if (game.score > game.highScore) {
                            game.highScore = game.score;
                            localStorage.setItem('spaceRunnerHighScore', game.highScore);
                        }
                    }
                } else if (p.y > canvas.height + 50) {
                    game.powerups.splice(i, 1);
                }
            }
        }

        function updateParticles() {
            for (let i = game.particles.length - 1; i >= 0; i--) {
                game.particles[i].update();
                if (game.particles[i].life <= 0) game.particles.splice(i, 1);
            }
        }

        function updateTimers() {
            if (game.player.multiShot) {
                game.player.multiShotTimer--;
                if (game.player.multiShotTimer <= 0) game.player.multiShot = false;
            }
            if (game.player.shieldActive) {
                game.player.shieldTimer--;
                if (game.player.shieldTimer <= 0) game.player.shieldActive = false;
            }
            if (game.player.hitFlash > 0) game.player.hitFlash--;
            if (game.comboTimer > 0) {
                game.comboTimer--;
                if (game.comboTimer === 0) game.combo = 0;
            }
            if (game.comboMessageTimer > 0) game.comboMessageTimer--;
        }

        function updateSpawning(dt) {
            game.spawnTimer += dt;
            const spawnInterval = Math.max(25, 50 - Math.floor(game.speed));
            if (game.spawnTimer >= spawnInterval) {
                game.spawnTimer = 0;
                spawnEntity();
            }

            if (!game.bossActive && game.score >= game.bossSpawnScore) {
                game.bossActive = true;
                game.bossSpawnScore += 500;
                game.enemies.push({
                    lane: 1,
                    x: game.player.lanePositions[1],
                    y: -80,
                    width: 80,
                    height: 70,
                    type: 'boss',
                    hp: 10,
                    moveDir: 1,
                    shootTimer: 0
                });
            }
        }

        function updateSpeed(dt) {
            game.speedAccumulator += dt;
            if (game.speedAccumulator >= 1) {
                game.speedAccumulator -= 1;
                if (game.speed < game.maxSpeed) game.speed += 0.05;
            }
        }

        function update(dt) {
            if (game.state !== 'playing') return;
            game.frameCount++;

            updateBackground(dt);
            updatePlayer(dt);
            updateBullets(dt);
            updateEnemies(dt);
            updateEnemyBullets();
            updatePowerups(dt);
            updateParticles();
            updateTimers();
            updateSpawning(dt);
            updateSpeed(dt);
        }

        // Zonas de fondo: el tinte del espacio avanza cada 500 puntos, reforzando la progresión
        const BACKGROUND_ZONES = ['#000011', '#110011', '#001108', '#110800', '#000818'];
        function getZoneBackground() {
            const zone = Math.floor(game.score / 500) % BACKGROUND_ZONES.length;
            return BACKGROUND_ZONES[zone];
        }

        function checkCollision(a, b) {
            const p = Math.min(8, Math.min(a.width, b.width) / 2);
            return a.x + p < b.x + b.width - p && a.x + a.width - p > b.x + p &&
                   a.y + p < b.y + b.height - p && a.y + a.height - p > b.y + p;
        }

        function getComboMultiplier() {
            if (game.combo >= 20) return 5;
            if (game.combo >= 10) return 3;
            if (game.combo >= 5) return 2;
            return 1;
        }

        function draw() {
            ctx.save();
            if (game.screenShake > 0) {
                const sx = (Math.random() - 0.5) * game.screenShake * 0.8;
                const sy = (Math.random() - 0.5) * game.screenShake * 0.8;
                ctx.translate(sx, sy);
                game.screenShake--;
            }
            // Space background (el tinte cambia de "zona" cada 500 puntos)
            ctx.fillStyle = getZoneBackground();
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            for (let star of game.stars) {
                const twinkle = 0.5 + Math.sin(game.frameCount * 0.1 + star.x) * 0.5;
                ctx.globalAlpha = star.brightness * twinkle;
                ctx.fillStyle = COLORS.white;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }
            ctx.globalAlpha = 1;
            
            // Planets
            for (let planet of game.planets) {
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
                ctx.fill();
                
                // Planet shadow
                ctx.beginPath();
                ctx.arc(planet.x - planet.radius * 0.3, planet.y - planet.radius * 0.3, planet.radius * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();
            }
            
            // Asteroids
            for (let ast of game.asteroids) {
                ctx.save();
                ctx.translate(ast.x, ast.y);
                ctx.rotate(ast.rotation);
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.moveTo(ast.size, 0);
                for (let i = 1; i < 7; i++) {
                    const angle = (i / 7) * Math.PI * 2;
                    const r = ast.size * (0.7 + Math.sin(i * 3) * 0.3);
                    ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            
            drawRoad();
            if (game.state === 'playing') {
                drawEntities();
                drawPlayer();
            }
            drawParticles();
            drawHUD();
            
            if (game.state === 'paused') drawPause();
            if (game.state === 'menu') drawMenu();
            else if (game.state === 'gameover') drawGameOver();
            else if (game.state === 'win') drawWin();
            ctx.restore();
        }

        function drawRoad() {
            const laneW = getLaneWidth();
            const startX = getLaneStartX();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 18]);
            ctx.lineDashOffset = -game.frameCount * 3;

            for (let i = 0; i <= 3; i++) {
                const x = startX + i * laneW - laneW / 2;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function drawPlayer() {
            const px = game.player.x;
            const py = game.player.y;
            
            if (game.player.hitFlash > 0) {
                ctx.globalAlpha = game.player.hitFlash % 4 < 2 ? 0.3 : 1.0;
            } else if (!game.player.canMove) {
                ctx.globalAlpha = 0.6;
            }

            ctx.shadowColor = COLORS.lightBlue;
            ctx.shadowBlur = 15;
            
            // Ship body
            const g = ctx.createLinearGradient(px, py, px + 50, py + 45);
            g.addColorStop(0, '#667788');
            g.addColorStop(0.5, '#889999');
            g.addColorStop(1, '#556677');
            ctx.fillStyle = g;
            
            ctx.beginPath();
            ctx.moveTo(px + 25, py);
            ctx.lineTo(px + 50, py + 25);
            ctx.lineTo(px + 42, py + 45);
            ctx.lineTo(px + 8, py + 45);
            ctx.lineTo(px, py + 25);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = COLORS.cyan;
            ctx.fillRect(px + 18, py + 12, 14, 10);
            
            // Engines with dynamic flame
            const flameHeight = 10 + Math.random() * 6;
            const flameOffset = Math.random() * 2;

            // Left engine
            ctx.fillStyle = COLORS.orange;
            ctx.fillRect(px + 8, py + 35, 8, 10);
            ctx.fillStyle = COLORS.yellow;
            ctx.fillRect(px + 10 + flameOffset, py + 38 - flameOffset, 4, 4);
            // Flame trail
            ctx.fillStyle = 'rgba(255, 136, 0, 0.4)';
            ctx.fillRect(px + 9, py + 45, 6, flameHeight);

            // Right engine
            ctx.fillStyle = COLORS.orange;
            ctx.fillRect(px + 34, py + 35, 8, 10);
            ctx.fillStyle = COLORS.yellow;
            ctx.fillRect(px + 36 - flameOffset, py + 38 - flameOffset, 4, 4);
            ctx.fillStyle = 'rgba(255, 136, 0, 0.4)';
            ctx.fillRect(px + 35, py + 45, 6, flameHeight);
            
            // Shield aura
            if (game.player.shieldActive) {
                ctx.shadowColor = COLORS.cyan;
                ctx.shadowBlur = 25;
                ctx.strokeStyle = COLORS.cyan;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(px + 25, py + 22, 32, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }

        function drawEntities() {
            // Enemies
            for (let e of game.enemies) {
                ctx.shadowColor = e.type === 'shooter' ? COLORS.orange : COLORS.red;
                ctx.shadowBlur = 10;

                if (e.type === 'tank') {
                    ctx.fillStyle = '#553355';
                    ctx.fillRect(e.x, e.y, e.width, e.height);
                    ctx.fillStyle = COLORS.purple;
                    ctx.fillRect(e.x + 3, e.y + 3, e.width - 6, 8);
                    // HP bar
                    const hpRatio = e.hp / 3;
                    ctx.fillStyle = hpRatio > 0.5 ? COLORS.green : hpRatio > 0.25 ? COLORS.orange : COLORS.red;
                    ctx.fillRect(e.x + 4, e.y + e.height - 6, (e.width - 8) * hpRatio, 4);
                } else if (e.type === 'speedster') {
                    // Silueta de rombo: distinta de todo lo demás, sin depender del color
                    const cx = e.x + e.width / 2, cy = e.y + e.height / 2;
                    ctx.fillStyle = '#553333';
                    ctx.beginPath();
                    ctx.moveTo(cx, e.y);
                    ctx.lineTo(e.x + e.width, cy);
                    ctx.lineTo(cx, e.y + e.height);
                    ctx.lineTo(e.x, cy);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = COLORS.orange;
                    ctx.beginPath();
                    ctx.moveTo(cx, e.y + 6);
                    ctx.lineTo(e.x + e.width - 6, cy);
                    ctx.lineTo(cx, e.y + e.height - 6);
                    ctx.lineTo(e.x + 6, cy);
                    ctx.closePath();
                    ctx.fill();
                } else if (e.type === 'boss') {
                    const pulse = 15 + Math.sin(game.frameCount * 0.15) * 10;
                    ctx.shadowColor = COLORS.purple;
                    ctx.shadowBlur = 20 + pulse;
                    ctx.fillStyle = '#552244';
                    ctx.fillRect(e.x, e.y, e.width, e.height);
                    // Eyes (parpadean periódicamente)
                    const blinking = game.frameCount % 90 < 6;
                    ctx.fillStyle = COLORS.red;
                    ctx.fillRect(e.x + 15, e.y + (blinking ? 24 : 20), 15, blinking ? 2 : 10);
                    ctx.fillRect(e.x + 50, e.y + (blinking ? 24 : 20), 15, blinking ? 2 : 10);
                    ctx.fillStyle = COLORS.yellow;
                    ctx.fillRect(e.x + e.width/2 - 5, e.y + e.height - 10, 10, 10);
                    // HP bar
                    const bHpRatio = e.hp / 10;
                    ctx.fillStyle = COLORS.red;
                    ctx.fillRect(e.x + 2, e.y + 2, (e.width - 4) * bHpRatio, 5);
                } else if (e.type === 'shooter') {
                    // Silueta de triángulo invertido: distinta del resto, apunta hacia el jugador
                    ctx.fillStyle = '#664433';
                    ctx.beginPath();
                    ctx.moveTo(e.x, e.y);
                    ctx.lineTo(e.x + e.width, e.y);
                    ctx.lineTo(e.x + e.width / 2, e.y + e.height);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = COLORS.orange;
                    ctx.fillRect(e.x + 5, e.y + 5, e.width - 10, 10);
                    ctx.fillStyle = COLORS.yellow;
                    ctx.fillRect(e.x + e.width/2 - 3, e.y + e.height - 8, 6, 5);
                } else {
                    // Normal: rectángulo simple (silueta base)
                    ctx.fillStyle = '#443344';
                    ctx.fillRect(e.x, e.y, e.width, e.height);
                    ctx.fillStyle = COLORS.red;
                    ctx.fillRect(e.x + 5, e.y + 5, e.width - 10, 10);
                }
                
                ctx.shadowBlur = 0;
            }
            
            // Powerups
            for (let p of game.powerups) {
                const color = p.type === 'health' ? COLORS.green : p.type === 'multishot' ? COLORS.orange : COLORS.cyan;
                ctx.shadowColor = color;
                ctx.shadowBlur = 12;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(p.x + p.width/2, p.y + p.height/2, p.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.font = '12px "Press Start 2P"';
                ctx.textAlign = 'center';
                const label = p.type === 'health' ? '+' : p.type === 'multishot' ? 'M' : 'S';
                ctx.fillText(label, p.x + p.width/2, p.y + p.height/2 + 4);
                ctx.shadowBlur = 0;
            }
            
            // Bullets
            for (let b of game.bullets) {
                ctx.shadowColor = b.isEnemy ? COLORS.red : COLORS.yellow;
                ctx.shadowBlur = 8;
                ctx.fillStyle = b.isEnemy ? COLORS.red : COLORS.yellow;
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.shadowBlur = 0;
            }
        }

        function drawParticles() {
            for (let p of game.particles) p.draw();
        }

        function drawHUD() {
            const sf = getScaleFactor();
            
            // Score with glow
            ctx.shadowColor = COLORS.white;
            ctx.shadowBlur = 10 * sf;
            ctx.font = `${14 * sf}px "Press Start 2P"`;
            ctx.fillStyle = COLORS.white;
            ctx.textAlign = 'left';
            ctx.fillText(`PUNTOS: ${game.score}`, 15 * sf, 25 * sf);
            ctx.shadowBlur = 0;

            // Hearts drawn with Canvas
            for (let i = 0; i < game.lives; i++) {
                const hx = canvas.width - 30 * sf - i * 25 * sf;
                const hy = 20 * sf;
                const s = 10 * sf;
                ctx.shadowColor = COLORS.red;
                ctx.shadowBlur = 6 * sf;
                ctx.fillStyle = COLORS.red;
                ctx.beginPath();
                ctx.moveTo(hx, hy + s/4);
                ctx.bezierCurveTo(hx - s/2, hy - s/4, hx - s, hy + s/3, hx, hy + s);
                ctx.bezierCurveTo(hx + s, hy + s/3, hx + s/2, hy - s/4, hx, hy + s/4);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // High score
            ctx.font = `${10 * sf}px "Press Start 2P"`;
            ctx.fillStyle = COLORS.lightBlue;
            ctx.textAlign = 'left';
            ctx.fillText(`MEJOR: ${game.highScore}`, 15 * sf, 45 * sf);

            // Speed bar
            const barX = 15 * sf, barY = 55 * sf, barW = 80 * sf, barH = 8 * sf;
            ctx.fillStyle = '#222';
            ctx.fillRect(barX, barY, barW, barH);

            const speedRatio = game.speed / game.maxSpeed;
            const grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
            grad.addColorStop(0, '#00ccff');
            grad.addColorStop(1, '#ffffff');
            ctx.shadowColor = '#00ccff';
            ctx.shadowBlur = 8 * sf;
            ctx.fillStyle = grad;
            ctx.fillRect(barX, barY, barW * speedRatio, barH);
            ctx.shadowBlur = 0;

            // Multishot indicator
            if (game.player.multiShot) {
                ctx.shadowColor = COLORS.orange;
                ctx.shadowBlur = 10 * sf;
                ctx.font = `${9 * sf}px "Press Start 2P"`;
                ctx.fillStyle = COLORS.orange;
                ctx.textAlign = 'left';
                ctx.fillText('MULTI x5', 15 * sf, 82 * sf);
                ctx.shadowBlur = 0;
            }

            // Shield indicator
            if (game.player.shieldActive) {
                ctx.shadowColor = COLORS.cyan;
                ctx.shadowBlur = 10 * sf;
                ctx.font = `${9 * sf}px "Press Start 2P"`;
                ctx.fillStyle = COLORS.cyan;
                ctx.textAlign = 'left';
                ctx.fillText('SHIELD', 15 * sf, 97 * sf);
                ctx.shadowBlur = 0;
            }

            // Combo indicator
            if (game.combo >= 5) {
                ctx.shadowColor = COLORS.yellow;
                ctx.shadowBlur = 10 * sf;
                ctx.font = `${12 * sf}px "Press Start 2P"`;
                ctx.fillStyle = COLORS.yellow;
                ctx.textAlign = 'center';
                ctx.fillText(`x${getComboMultiplier()} COMBO`, canvas.width / 2, 25 * sf);
                ctx.shadowBlur = 0;
            }

            // Combo message (posicionado en el HUD superior, fuera del área de juego)
            if (game.comboMessageTimer > 0) {
                ctx.font = `${10 * sf}px "Press Start 2P"`;
                ctx.fillStyle = COLORS.red;
                ctx.textAlign = 'center';
                ctx.fillText(game.comboMessage, canvas.width / 2, 45 * sf);
            }

            drawTouchButtons(sf);
        }

        // Botones táctiles de pausa/mute (paridad con controles de teclado en móvil)
        function getPauseButtonRect() {
            const sf = getScaleFactor();
            const s = 26 * sf;
            return { x: canvas.width - s - 12 * sf, y: canvas.height - s - 12 * sf, w: s, h: s };
        }
        function getMuteButtonRect() {
            const sf = getScaleFactor();
            const s = 26 * sf;
            return { x: canvas.width - s * 2 - 24 * sf, y: canvas.height - s - 12 * sf, w: s, h: s };
        }

        function drawTouchButtons(sf) {
            if (game.state !== 'playing' && game.state !== 'paused') return;

            const pause = getPauseButtonRect();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(pause.x, pause.y, pause.w, pause.h);
            ctx.fillStyle = COLORS.white;
            if (game.state === 'paused') {
                ctx.beginPath();
                ctx.moveTo(pause.x + pause.w * 0.3, pause.y + pause.h * 0.2);
                ctx.lineTo(pause.x + pause.w * 0.3, pause.y + pause.h * 0.8);
                ctx.lineTo(pause.x + pause.w * 0.8, pause.y + pause.h * 0.5);
                ctx.closePath();
                ctx.fill();
            } else {
                ctx.fillRect(pause.x + pause.w * 0.28, pause.y + pause.h * 0.2, pause.w * 0.18, pause.h * 0.6);
                ctx.fillRect(pause.x + pause.w * 0.55, pause.y + pause.h * 0.2, pause.w * 0.18, pause.h * 0.6);
            }

            const mute = getMuteButtonRect();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(mute.x, mute.y, mute.w, mute.h);
            ctx.fillStyle = COLORS.white;
            ctx.beginPath();
            ctx.moveTo(mute.x + mute.w * 0.2, mute.y + mute.h * 0.35);
            ctx.lineTo(mute.x + mute.w * 0.45, mute.y + mute.h * 0.35);
            ctx.lineTo(mute.x + mute.w * 0.65, mute.y + mute.h * 0.15);
            ctx.lineTo(mute.x + mute.w * 0.65, mute.y + mute.h * 0.85);
            ctx.lineTo(mute.x + mute.w * 0.45, mute.y + mute.h * 0.65);
            ctx.lineTo(mute.x + mute.w * 0.2, mute.y + mute.h * 0.65);
            ctx.closePath();
            ctx.fill();
            if (game.muted) {
                ctx.strokeStyle = COLORS.red;
                ctx.lineWidth = 2 * sf;
                ctx.beginPath();
                ctx.moveTo(mute.x + mute.w * 0.1, mute.y + mute.h * 0.1);
                ctx.lineTo(mute.x + mute.w * 0.9, mute.y + mute.h * 0.9);
                ctx.stroke();
            }
        }

        function pointInRect(px, py, r) {
            return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
        }

        function toggleMute() {
            game.muted = !game.muted;
            bgMusic.muted = game.muted;
            if (musicGain) musicGain.gain.value = game.muted ? 0 : 0.3;
            localStorage.setItem('spaceRunnerMuted', game.muted ? '1' : '0');
        }

        function togglePause() {
            if (game.state === 'playing') {
                game.state = 'paused';
                stopMusic();
            } else if (game.state === 'paused') {
                game.state = 'playing';
                setTimeout(() => startMusic(), 100);
            }
        }

        function drawMenu() {
            const sf = getScaleFactor();
            ctx.fillStyle = 'rgba(0, 0, 20, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Animated ship preview
            const previewX = canvas.width / 2 + Math.sin(Date.now() / 2000) * 120 * sf;
            const previewY = canvas.height * 0.2;
            
            // Engine trail particles
            for (let i = 0; i < 5; i++) {
                const t = (Date.now() / 300 + i * 0.3) % 1;
                const trailX = previewX + 25 + (Math.random() - 0.5) * 6;
                const trailY = previewY + 45 + t * 30;
                ctx.globalAlpha = 0.3 * (1 - t);
                ctx.fillStyle = COLORS.orange;
                ctx.fillRect(trailX - 2, trailY, 4, 6);
            }
            ctx.globalAlpha = 1;
            
            ctx.save();
            ctx.translate(previewX, previewY);
            ctx.shadowColor = COLORS.lightBlue;
            ctx.shadowBlur = 30;
            // Ship body
            const g2 = ctx.createLinearGradient(0, 0, 50, 45);
            g2.addColorStop(0, '#667788');
            g2.addColorStop(0.5, '#889999');
            g2.addColorStop(1, '#556677');
            ctx.fillStyle = g2;
            ctx.beginPath();
            ctx.moveTo(25, 0);
            ctx.lineTo(50, 25);
            ctx.lineTo(42, 45);
            ctx.lineTo(8, 45);
            ctx.lineTo(0, 25);
            ctx.closePath();
            ctx.fill();
            // Cockpit
            ctx.fillStyle = COLORS.cyan;
            ctx.fillRect(18, 12, 14, 10);
            // Engines
            ctx.shadowBlur = 0;
            ctx.fillStyle = COLORS.orange;
            ctx.fillRect(8, 35, 8, 8);
            ctx.fillRect(34, 35, 8, 8);
            ctx.fillStyle = COLORS.yellow;
            ctx.fillRect(10, 37, 4, 4);
            ctx.fillRect(36, 37, 4, 4);
            ctx.restore();
            
            const cx = canvas.width / 2;
            // title:true -> fuente pixelada (identidad retro); el resto usa FONT_BODY (legibilidad)
            const lines = [
                { y: 0.30, text: 'SPACE', size: 22, color: COLORS.white, glow: true, title: true },
                { y: 0.335, text: 'RUNNER', size: 22, color: COLORS.white, glow: true, title: true },
                { y: 0.40, text: '=== CONTROLES ===', size: 10, color: COLORS.lightBlue, title: true },
                { y: 0.435, text: 'A / IZQUIERDA <- Mover Izquierda', size: 9, color: COLORS.white },
                { y: 0.455, text: 'D / DERECHA  -> Mover Derecha', size: 9, color: COLORS.white },
                { y: 0.475, text: 'ESPACIO     -> Disparar', size: 9, color: COLORS.white },
                { y: 0.505, text: 'DESLIZAR IZQ/DER -> Mover carril', size: 9, color: COLORS.white },
                { y: 0.525, text: 'TOCAR CENTRO    -> Disparar', size: 9, color: COLORS.white },
                { y: 0.545, text: 'ESC/P -> Pausar   M -> Silenciar', size: 9, color: COLORS.white },
                { y: 0.580, text: '=== OBJETIVO ===', size: 10, color: COLORS.lightBlue, title: true },
                { y: 0.615, text: 'Destruye enemigos (+15/30 pts)', size: 9, color: COLORS.yellow },
                { y: 0.635, text: 'Recoge potenciadores (+40 pts)', size: 9, color: COLORS.yellow },
                { y: 0.655, text: 'Evita colisiones! (3 vidas)', size: 9, color: COLORS.yellow },
                { y: 0.69, text: 'LLEGA A 1500 PUNTOS PARA GANAR!', size: 9, color: COLORS.green, title: true },
            ];

            ctx.textAlign = 'center';
            for (const l of lines) {
                if (l.glow) { ctx.globalAlpha = Math.sin(Date.now() / 400) * 0.3 + 0.7; }
                ctx.font = `${l.size * sf}px ${l.title ? FONT_TITLE : FONT_BODY}`;
                ctx.fillStyle = l.color;
                ctx.fillText(l.text, cx, canvas.height * l.y);
                if (l.glow) ctx.globalAlpha = 1;
            }

            if (game.highScore > 0) {
                ctx.font = `${8 * sf}px ${FONT_TITLE}`;
                ctx.fillStyle = COLORS.cyan;
                ctx.fillText(`MEJOR: ${game.highScore}`, cx, canvas.height * 0.72);
            }

            if (Math.sin(Date.now() / 250) > 0) {
                ctx.font = `${11 * sf}px ${FONT_BODY}`;
                ctx.fillStyle = COLORS.white;
                ctx.fillText('PRESIONA ESPACIO O TOCA PARA INICIAR', cx, canvas.height * 0.94);
            }
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 20, 0.92)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cy = canvas.height / 2;
            ctx.textAlign = 'center';

            ctx.font = `14px ${FONT_TITLE}`;
            ctx.fillStyle = COLORS.red;
            ctx.fillText('GAME OVER', canvas.width / 2, cy - 80);

            ctx.font = `16px ${FONT_BODY}`;
            ctx.fillStyle = COLORS.white;
            ctx.fillText(`PUNTAJE FINAL: ${game.score}`, canvas.width / 2, cy - 10);

            if (game.score >= game.highScore && game.score > 0) {
                ctx.fillStyle = COLORS.yellow;
                ctx.fillText('NUEVO RECORD!', canvas.width / 2, cy + 35);
            } else {
                ctx.fillStyle = COLORS.lightBlue;
                ctx.fillText(`MEJOR: ${game.highScore}`, canvas.width / 2, cy + 35);
            }

            if (Math.sin(Date.now() / 250) > 0) {
                ctx.font = `12px ${FONT_BODY}`;
                ctx.fillStyle = COLORS.white;
                ctx.fillText('ESPACIO O TOCA PARA REINICIAR', canvas.width / 2, cy + 100);
            }

            drawShareButton(cy + 140);
        }

        // Botón "compartir puntaje": Web Share API si está disponible, si no copia al portapapeles
        function getShareButtonRect(y) {
            const w = 220, h = 44;
            return { x: canvas.width / 2 - w / 2, y: y - h / 2, w, h };
        }

        function drawShareButton(y) {
            const rect = getShareButtonRect(y);
            ctx.fillStyle = 'rgba(136, 204, 255, 0.15)';
            ctx.strokeStyle = COLORS.lightBlue;
            ctx.lineWidth = 2;
            ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
            ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
            ctx.font = `12px ${FONT_BODY}`;
            ctx.fillStyle = COLORS.lightBlue;
            ctx.textAlign = 'center';
            ctx.fillText(game.shareFeedback || 'COMPARTIR PUNTAJE', canvas.width / 2, rect.y + rect.h / 2 + 4);
        }

        async function shareScore() {
            const text = `Hice ${game.score} puntos en Space Runner!`;
            try {
                if (navigator.share) {
                    await navigator.share({ text, title: 'Space Runner' });
                } else if (navigator.clipboard) {
                    await navigator.clipboard.writeText(text);
                    game.shareFeedback = 'COPIADO AL PORTAPAPELES';
                    setTimeout(() => { game.shareFeedback = ''; }, 1500);
                }
            } catch (e) {}
        }

        function drawWin() {
            const sf = getScaleFactor();
            ctx.fillStyle = 'rgba(0, 0, 20, 0.92)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.textAlign = 'center';

            const glow = Math.sin(Date.now() / 300) * 0.3 + 0.7;
            ctx.globalAlpha = glow;
            ctx.font = `${22 * sf}px ${FONT_TITLE}`;
            ctx.fillStyle = COLORS.green;
            ctx.fillText('GANASTE!', cx, cy - 80 * sf);
            ctx.globalAlpha = 1;

            ctx.font = `${16 * sf}px ${FONT_BODY}`;
            ctx.fillStyle = COLORS.white;
            ctx.fillText(`PUNTAJE FINAL: ${game.score}`, cx, cy - 10 * sf);

            if (game.score >= game.highScore) {
                ctx.fillStyle = COLORS.yellow;
                ctx.fillText('NUEVO RECORD!', cx, cy + 35 * sf);
            }

            if (Math.sin(Date.now() / 250) > 0) {
                ctx.font = `${12 * sf}px ${FONT_BODY}`;
                ctx.fillStyle = COLORS.white;
                ctx.fillText('ESPACIO O TOCA PARA REINICIAR', cx, cy + 100 * sf);
            }

            drawShareButton(cy + 140 * sf);
        }

        function drawPause() {
            ctx.fillStyle = 'rgba(0, 0, 20, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';

            ctx.font = '22px "Press Start 2P"';
            ctx.fillStyle = COLORS.white;
            ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2 - 60);

            ctx.font = '9px "Press Start 2P"';
            ctx.fillStyle = COLORS.lightBlue;
            ctx.fillText('ESC / P PARA CONTINUAR', canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('ESPACIO PARA REINICIAR', canvas.width / 2, canvas.height / 2 + 40);
            ctx.fillText('M PARA SILENCIAR', canvas.width / 2, canvas.height / 2 + 70);
        }

        let lastTime = 0;

        function gameLoop(timestamp) {
            try {
                const dt = lastTime ? Math.min((timestamp - lastTime) / 16.67, 3) : 1;
                lastTime = timestamp;
                update(dt);
                draw();
            } catch(e) {
                console.error('Game loop error:', e);
            }
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            initAudio();

            if ((e.code === 'Escape' || e.code === 'KeyP') && (game.state === 'playing' || game.state === 'paused')) {
                e.preventDefault();
                togglePause();
                return;
            }

            if (e.code === 'KeyM') {
                e.preventDefault();
                toggleMute();
                return;
            }

            if (e.code === 'Space') {
                e.preventDefault();
                if (game.state === 'menu' || game.state === 'gameover' || game.state === 'win' || game.state === 'paused') {
                    game.state = 'playing';
                    initGame();
                    setTimeout(() => startMusic(), 100);
                } else if (game.state === 'playing' && (!game.player.shootCooldown || game.player.shootCooldown === 0)) {
                    shoot();
                }
            }
            
            if (game.state === 'playing' && game.player.canMove && game.player.moveCooldown === 0) {
                if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && game.player.targetLane > 0) {
                    game.player.targetLane--;
                    game.player.moveCooldown = 3;
                }
                if ((e.code === 'ArrowRight' || e.code === 'KeyD') && game.player.targetLane < 2) {
                    game.player.targetLane++;
                    game.player.moveCooldown = 3;
                }
            }
        });

        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            
            const touch = e.touches[0];
            game.lastTouchY = touch.clientY;
            game.lastTouchX = touch.clientX;
            game.lastTouchTime = Date.now();
            
            // Use touch position directly since canvas fills the screen
            const relY = touch.clientY;
            
            if (game.state === 'gameover' || game.state === 'win') {
                const shareY = (game.state === 'gameover' ? canvas.height / 2 + 140 : canvas.height / 2 + 140 * getScaleFactor());
                if (pointInRect(touch.clientX, touch.clientY, getShareButtonRect(shareY))) {
                    shareScore();
                    return;
                }
            }

            if (game.state === 'menu' || game.state === 'gameover' || game.state === 'win') {
                game.state = 'playing';
                initGame();
                setTimeout(() => startMusic(), 100);
                return;
            }

            if (game.state === 'playing' || game.state === 'paused') {
                if (pointInRect(touch.clientX, touch.clientY, getPauseButtonRect())) {
                    togglePause();
                    return;
                }
                if (pointInRect(touch.clientX, touch.clientY, getMuteButtonRect())) {
                    toggleMute();
                    return;
                }
            }

            if (game.state === 'playing') {
                game.player.moveCooldown = 0;

                // Zona de disparo (centro) - 25% a 75% de la pantalla
                if (relY >= canvas.height * 0.25 && relY <= canvas.height * 0.75) {
                    if (!game.player.shootCooldown || game.player.shootCooldown === 0) {
                        shoot();
                    }
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (game.state !== 'playing') return;

            const touch = e.changedTouches[0];
            const deltaY = touch.clientY - game.lastTouchY;
            const deltaX = touch.clientX - game.lastTouchX;
            const deltaTime = Date.now() - game.lastTouchTime;

            if (deltaTime < 300 && Math.abs(deltaX) > 30) {
                if (deltaX < -30 && game.player.targetLane > 0) {
                    game.player.targetLane--;
                    game.player.moveCooldown = 0;
                } else if (deltaX > 30 && game.player.targetLane < 2) {
                    game.player.targetLane++;
                    game.player.moveCooldown = 0;
                }
            }

            game.player.moveCooldown = 0;
        }, { passive: false });

        document.addEventListener('touchstart', function initOnTouch() {
            initAudio();
            document.removeEventListener('touchstart', initOnTouch);
        }, { once: true });

        document.addEventListener('click', function initOnClick() {
            initAudio();
            document.removeEventListener('click', initOnClick);
        }, { once: true });

        canvas.addEventListener('click', (e) => {
            initAudio();

            if (game.state === 'playing' || game.state === 'paused') {
                if (pointInRect(e.clientX, e.clientY, getPauseButtonRect())) {
                    togglePause();
                    return;
                }
                if (pointInRect(e.clientX, e.clientY, getMuteButtonRect())) {
                    toggleMute();
                    return;
                }
            }

            if (game.state !== 'gameover' && game.state !== 'win') return;
            const shareY = (game.state === 'gameover' ? canvas.height / 2 + 140 : canvas.height / 2 + 140 * getScaleFactor());
            if (pointInRect(e.clientX, e.clientY, getShareButtonRect(shareY))) {
                shareScore();
            }
        });

        initStars();
        initPlanets();
        initAsteroids();
        updateLanes();
        game.player.x = game.player.lanePositions[1];
        gameLoop();
    </script>
</body>
</html>
